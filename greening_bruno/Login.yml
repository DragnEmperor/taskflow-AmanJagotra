info:
  name: Login
  type: http
  seq: 2

http:
  method: POST
  url: "{{URL}}/auth/login"
  body:
    type: json
    data: |-
      {
        "email":"test@example.com",
        "password":"password123"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        let data = res.body;
        bru.setEnvVar("ACCESS_TOKEN", data.token);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
