info:
  name: Create User
  type: http
  seq: 1

http:
  method: POST
  url: "{{URL}}/auth/register"
  body:
    type: json
    data: |-
      {
        "name":"Aman",
        "email":"aman@test.com",
        "password": "aimbot123"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        let data = res.body;
        bru.setEnvVar("ACCESS_TOKEN", data.token);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
